# Зеркало лендинга mafia на GitHub Pages (не Cloudflare — удобнее из РФ без VPN).
#
# Обязательно один раз: https://github.com/weirdsar/sii5/settings/pages
# → Build and deployment → Source: «GitHub Actions» (не ветка). Иначе deploy падает с 404.
name: Deploy mafia to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mafia_sii5_ru/**'
      - '.github/workflows/github-pages-mafia.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-mafia
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mafia_sii5_ru/package-lock.json

      - name: Сборка (base = /имя-репо/)
        working-directory: mafia_sii5_ru
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: mafia_sii5_ru/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Настроить Pages (метаданные для деплоя)
        uses: actions/configure-pages@v5

      - name: Опубликовать на GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
